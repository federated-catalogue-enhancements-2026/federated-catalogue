<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Federated Catalogue</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/lib/styles.css" rel="stylesheet" />
        <!-- Bootstrap Icons (local) -->
        <link rel="stylesheet" href="css/lib/bootstrap-icons.min.css">
        <style>
            body {
                background-color: #f8f9fa;
            }
            #top-header {
                background-color: #000094;
                color: #fff;
                padding: 0.7rem 1.25rem;
                font-size: 1.1rem;
                font-weight: 600;
                display: flex;
                align-items: center;
                box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,.15);
            }
            .login-card {
                max-width: 400px;
                margin: 0 auto;
                margin-top: 15vh;
            }
        </style>
    </head>
    <body>
        <!-- Same header as logged-in page -->
        <div id="top-header">
            <i class="bi bi-collection me-2"></i>Federated Catalogue
        </div>

        <!-- Centered login card -->
        <div class="login-card">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="bi bi-shield-lock" style="font-size: 3rem; color: #000094;"></i>
                    <h4 class="mt-3 mb-2">Welcome</h4>
                    <p class="text-muted mb-4">Please log in to access the Federated Catalogue.</p>
                    <a class="btn btn-primary px-4" href="menu.html">Login</a>
                </div>
            </div>
        </div>

        <!-- Bootstrap core JS-->
        <script src="js/lib/bootstrap.bundle.min.js"></script>
    </body>
</html>
