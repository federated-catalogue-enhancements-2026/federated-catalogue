<!DOCTYPE html>
<html lang="en">
<head><title>Trust Frameworks</title></head>
<body>
<div class="container-fluid mt-2">
    <div id="admin-content" style="display:none">

        <table class="table table-bordered table-light cell-border" id="tfTable" style="width:100%">
            <thead>
            <tr>
                <th>Name</th>
                <th>Framework ID</th>
                <th>Service URL</th>
                <th>Status</th>
                <th>Active</th>
                <th>Config</th>
            </tr>
            </thead>
        </table>

        <!-- Config Modal -->
        <div class="modal" id="tfConfigModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Trust Framework Configuration</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="tfConfigId">
                        <div class="mb-3">
                            <label for="tfServiceUrl" class="form-label">Service URL</label>
                            <input type="url" class="form-control" id="tfServiceUrl" placeholder="https://...">
                        </div>
                        <div class="mb-3">
                            <label for="tfApiVersion" class="form-label">API Version</label>
                            <input type="text" class="form-control" id="tfApiVersion" placeholder="e.g. 22.10">
                        </div>
                        <div class="mb-3">
                            <label for="tfTimeout" class="form-label">Timeout (seconds)</label>
                            <input type="number" class="form-control" id="tfTimeout" min="1" max="300" value="30">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="tfConfigSave">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="js/admin-trust-frameworks.js"></script>
</body>
</html>
