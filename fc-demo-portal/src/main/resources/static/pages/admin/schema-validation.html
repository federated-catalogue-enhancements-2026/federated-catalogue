<!DOCTYPE html>
<html lang="en">
<head><title>Schema Validation</title></head>
<body>
<div class="container-fluid mt-2">
    <div id="admin-content" style="display:none">

        <h6 class="text-muted text-uppercase fw-semibold mb-2 admin-section-header">
            <i class="bi bi-shield-check me-1"></i>Schema Validation Modules
        </h6>
        <p class="text-muted small mb-3">
            Enable or disable each schema language module. Toggling a module off
            prevents it from being consulted at on-demand validation; stored
            schemas are kept but not used.
        </p>

        <div class="mb-3">
            <span class="badge bg-info" style="font-size: 0.9rem;">
                Total Schemas: <span id="totalSchemaCount">-</span>
            </span>
        </div>

        <table class="table table-bordered table-light cell-border" id="svTable" style="width:100%">
            <thead>
            <tr>
                <th>Module</th>
                <th>Description</th>
                <th>Schemas</th>
                <th>Active</th>
            </tr>
            </thead>
        </table>

    </div>
</div>
<script src="js/admin-schema-validation.js"></script>
</body>
</html>
