# Gaia-X Trust Framework bundle — Loire 2511 profile
#
# Fields:
#   id             — unique profile identifier; used as the key in TrustFrameworkRegistry
#   family         — groups related profiles (e.g. "gaia-x" groups all Gaia-X versions)
#   namespace      — base URI prefix used to construct role root URIs (must end with '/' or '#')
#   validation_type — "shacl" | "json-schema" (non-shacl values are accepted-but-deferred per ADR-12)
#   roles          — map of role-name → role config; each role is resolvable via registry.resolveRole()
#     additional_roots — explicit URIs mapped to this role that are NOT OWL subclasses of the root.
#                        Use only when an external ontology genuinely declares sibling classes
#                        without subsumption — not as a workaround to collapse two distinct concepts
#                        into the same role.
#     types            — explicit type list for JSON Schema engines (forward-compat; unused for SHACL)
#     result_type      — stable string identifier for result-materialization dispatch; empty = generic result
#   properties     — framework-specific key/value metadata (reserved; not used by the resolver)

id: gaia-x-2511
family: gaia-x
namespace: "https://w3id.org/gaia-x/2511#"
validation_type: shacl

roles:
  Participant:
    additional_roots: [ ]
    types: [ ]
    result_type: Participant

  ServiceOffering:
    # KNOWN SEMANTIC DEBT:
    # gx:DigitalServiceOffering is not an OWL subclass of gx:ServiceOffering in gx-2511.
    # It is mapped here so DSO credentials resolve to the ServiceOffering role and reuse
    # the typed result POJO. This is a stop-gap: the role -> result-POJO dispatch is
    # still hardcoded to Gaia-X roles in the verification core (only the result_type
    # *declaration* is bundle-driven today; the *consumption* is not), so DSO has no
    # place to land otherwise. Once dispatch is bundle-driven end-to-end and the
    # typed-POJO coupling is removed, DSO should be modelled as its own bundle role
    # with its own result_type and removed from this list — the catalogue should not
    # silently assert ontology-level equivalence the spec does not declare.
    additional_roots:
      - "https://w3id.org/gaia-x/2511#DigitalServiceOffering"
    types: [ ]
    result_type: ServiceOffering

  Resource:
    additional_roots: [ ]
    types: [ ]
    result_type: Resource

properties: { }
