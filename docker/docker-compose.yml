
services:
  postgres:
    container_name: "fc-postgres"
    image: library/postgres:14
    restart: on-failure
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_MULTIPLE_DATABASES: fed_cat, keycloak
    expose:
      - "5432"
    ports:
      - "5432:5432"
    networks:
      - "gaia-x"
    volumes:
      - fc-pgdata:/var/lib/postgresql/data/
      - ./postgres-initdb-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: pg_isready -d postgres -U postgres
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          
  neo4j:
    container_name: "neo4j"
    image: neo4j:5.18.0
    environment:
      NEO4J_AUTH: "${GRAPH_STORE_USER}/${GRAPH_STORE_PASSWORD}"
      NEO4J_server_http_listen__address: :7474
      NEO4J_server_bolt_listen__address: :7687
      NEO4J_PLUGINS: '["apoc", "graph-data-science", "n10s"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*,n10s.*,semantics.*
      NEO4J_dbms_security_procedures_allowlist: gds.*,apoc.*,n10s.*,semantics.*
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - "gaia-x"
    restart: always
    command: neo4j
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
#    volumes:
#      - '$HOME/neo4j/data:/data'
#      - '$HOME/neo4j/conf/:/conf/'

  keycloak:
    container_name: "keycloak"
    environment:
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_DB_SCHEMA: public
      KC_FEATURES: preview
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      PROXY_ADDRESS_FORWARDING: "true"
    image: quay.io/keycloak/keycloak:26.0
    ports:
      - "8080:8080"
    networks:
      gaia-x:
        aliases:
          - key-server
    restart: unless-stopped
    volumes:
      - "../keycloak/providers:/opt/keycloak/providers"
      - "../keycloak/realms:/opt/keycloak/data/import"
    command: >
      start --db postgres --hostname-strict false --http-enabled true --import-realm 
      --log-level=DEBUG,io.quarkus:INFO,liquibase:INFO,org.hibernate:INFO,org.infinispan:INFO,org.keycloak.services.scheduled:INFO,org.keycloak.transaction:INFO,io.netty.buffer.PoolThreadCache:INFO,org.keycloak.models.sessions.infinispan:INFO
    depends_on:
      postgres:
        condition: service_healthy

  nats:
    image: nats:alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: always
    command: --js --sd /data -p 4222 -m 8222
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8222/healthz || exit 1
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks: 
      - "gaia-x"

# Optional: Fuseki SPARQL-star backend. Uncomment when using GRAPH_STORE_IMPL=fuseki (e.g. dev-fuseki.env).
# Not needed for neo4j or none backends.
#  fuseki:
#    container_name: "fuseki"
#    image: docker.io/stain/jena-fuseki
#    environment:
#      ADMIN_PASSWORD: "${GRAPH_STORE_PASSWORD}"
#      FUSEKI_DATASET_1: "ds"
#      JVM_ARGS: "-Xmx1g"
#    ports:
#      - "3330:3030"
#    networks:
#      - "gaia-x"
#    restart: unless-stopped
#    healthcheck:
#      test: wget --no-verbose --tries=1 --spider http://localhost:3030/ds || exit 1
#      interval: 20s
#      timeout: 5s
#      retries: 5
#      start_period: 30s

  # Local trust environment for signature verification. Serves three roles:
  #   1. DID resolution:    /.well-known/did.json        (did:web:did-server → public key JWK)
  #   2. Cert chain hosting: /certs/chain.pem             (x5u target for trust anchor validation)
  #   3. Trust anchor mock:  /api/trustAnchor/chain/file  (returns 200 for any POST)
  # See: cat-integration-tests/docs/adr/002-did-web-over-did-jwk.md
  did-server:
    container_name: "did-server"
    image: nginx:alpine
    volumes:
      - ./did-server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./did-server/certs:/etc/nginx/certs:ro
      - ./did-server/www:/usr/share/nginx/html:ro
    networks:
      gaia-x:
        aliases:
          - did-server
    restart: unless-stopped

  server:
    container_name: "fc-server"
#    image: node-654e3bca7fbeeed18f81d7c7.ps-xaas.io/catalogue/fc-service-server:2.0.0
    build:
      context: "${FC_SERVICE_SERVER_DOCKER_CONTEXT}"
      dockerfile: "${FC_DOCKERFILE:-Dockerfile}"
      target: "${FC_SERVICE_SERVER_DOCKER_TARGET}"
    environment:
      KEYCLOAK_CREDENTIALS_SECRET: "${FC_CLIENT_SECRET}"
      SPRING_DATASOURCE_URL: "${DB_URL}"
      GRAPHSTORE_URI: "${GRAPH_STORE_URI}"
      GRAPHSTORE_USER: "${GRAPH_STORE_USER}"
      GRAPHSTORE_PASSWORD: "${GRAPH_STORE_PASSWORD}"
      GRAPHSTORE_IMPL: "${GRAPH_STORE_IMPL}"
      # Spring Data Neo4j autoconfiguration
      SPRING_NEO4J_URI: "${GRAPH_STORE_URI}"
      SPRING_NEO4J_AUTHENTICATION_USERNAME: "${GRAPH_STORE_USER}"
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: "${GRAPH_STORE_PASSWORD}"
      PUBLISHER_IMPL: nats
      PUBLISHER_URL: ${NATS_URL}
      SUBSCRIBER_IMPL: none
      # DID resolution: 'local' resolves did:web directly from this container;
      # 'uni-res' delegates to an external Universal Resolver (requires network access).
      # Local is required for docker-compose where did-server is only reachable on the Docker network.
      FEDERATED_CATALOGUE_VERIFICATION_SIGNATURE_VERIFIER: local
      # Verification defaults: only semantics enabled.
      # Signatures are off because they provide no security without the trust framework (ADR 3).
      # Use docker-compose.strict.yml overlay to enable full verification.
      FEDERATED_CATALOGUE_VERIFICATION_VP_SIGNATURE: "${VERIFY_VP_SIGNATURE:-false}"
      FEDERATED_CATALOGUE_VERIFICATION_VC_SIGNATURE: "${VERIFY_VC_SIGNATURE:-false}"
      FEDERATED_CATALOGUE_VERIFICATION_TRUST_FRAMEWORK_GAIAX_ENABLED: "${GAIAX_TRUST_FRAMEWORK_ENABLED:-false}"

      FEDERATED_CATALOGUE_VERIFICATION_SCHEMA: "${VERIFY_SCHEMA:-false}"# Trust anchor URL — mock registry on did-server for test environments.
      # Override in production with the real Gaia-X registry URL.
      FEDERATED_CATALOGUE_VERIFICATION_TRUST_FRAMEWORK_GAIAX_TRUST_ANCHOR_URL: "${FC_TRUST_ANCHOR_URL:-https://did-server/api/trustAnchor/chain/file}"
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.trustStore=/opt/certs/custom-cacerts
        -Djavax.net.ssl.trustStorePassword=changeit
    volumes:
      - ./certs/custom-cacerts:/opt/certs/custom-cacerts:ro
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "8081:8081"
    networks:
      - "gaia-x"
    restart: always #unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      nats:
        condition: service_healthy
      did-server:
        condition: service_started

  portal:
    container_name: "demo-portal"
#    image: node-654e3bca7fbeeed18f81d7c7.ps-xaas.io/catalogue/fc-demo-portal:2.0.0
    build:
      context: "${FC_DEMO_PORTAL_DOCKER_CONTEXT}"
      dockerfile: "${FC_DOCKERFILE:-Dockerfile}"
      target: "${FC_DEMO_PORTAL_DOCKER_TARGET}"
    environment:
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_FC_CLIENT_OIDC_CLIENT_SECRET: "${FC_CLIENT_SECRET}"
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://key-server:8080/realms/gaia-x
      FEDERATED_CATALOGUE_BASE_URI: http://fc-server:8081
    ports:
      - "8088:8088"
    networks:
      - "gaia-x"
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

volumes:
  fc-pgdata:

networks:
  gaia-x:
    driver: "bridge"