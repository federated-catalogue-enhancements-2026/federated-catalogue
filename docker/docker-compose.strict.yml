# Strict verification overlay — enables signature and schema verification.
# Gaia-X Trust Framework is disabled pending Loire ontology compatibility (see TODO below).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.strict.yml --env-file dev.env up
#   ./dev.sh strict
#
# See: cat-integration-tests/docs/adr/003-interim-two-config-test-strategy.md

services:
  server:
    environment:
      # TODO(gaia-x-loire): Flip to "true" after story 035 (Loire Ontology Migration) lands — requires 2511 shapes + type resolution
      FEDERATED_CATALOGUE_VERIFICATION_TRUST_FRAMEWORK_GAIAX_ENABLED: "false"
      FEDERATED_CATALOGUE_VERIFICATION_SCHEMA: "true"
      FEDERATED_CATALOGUE_VERIFICATION_VP_SIGNATURE: "true"
      FEDERATED_CATALOGUE_VERIFICATION_VC_SIGNATURE: "true"