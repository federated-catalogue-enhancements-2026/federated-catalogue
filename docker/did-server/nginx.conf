server {
    listen 443 ssl;
    server_name did-server;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # DID document
    location /.well-known/did.json {
        root /usr/share/nginx/html;
        default_type application/did+ld+json;
    }

    # Certificate chain (x5u endpoint)
    location /certs/ {
        root /usr/share/nginx/html;
        default_type application/x-pem-file;
    }

    # Mock Gaia-X Trust Anchor Registry
    # Accepts POST with {uri: ...} and returns 200 with valid response.
    # In production this would be https://registry.lab.gaia-x.eu/v1/api/trustAnchor/chain/file
    location /api/trustAnchor/chain/file {
        default_type application/json;
        return 200 '{"statusCode":200,"message":"Trust anchor verified"}';
    }
}