management:
  endpoint:
    configprops:
      show-values: ALWAYS
    env:
      show-values: ALWAYS
    health:
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health, info, graph-rebuild

server:
  port: 8081
  tomcat:
    mbeanregistry:
      enabled: true
    threads:
      max: 200
      min-spare: 20
  shutdown: graceful

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: federated-catalogue-service
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    platform: postgresql
    hikari:
      connectionTimeout: 30000
      idleTimeout: 600000
      maxLifetime: 1800000
      minimumIdle: 8
      maximumPoolSize: 128
  liquibase:
    change-log: classpath:/liquibase/master-changelog.xml
  main:
    allow-bean-definition-overriding: true    
  mvc:
    log-request-details: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://key-server:8080/realms/gaia-x
#          jwk-set-uri: http://key-server:8080/realms/gaia-x/protocol/openid-connect/certs
  threads:
    virtual:
      enabled: true
  transaction:
    default-timeout: 10

scheduler:
  asset:
    cron:
      expression: 0 1 0 * * *
  schema:
    init-delay: 10000

openapi:
  gaiaXCatalogue:
    base-path: ""

springdoc:
  api-docs:
    path: /api/docs
    enabled: true

keycloak:
  auth-server-url: http://key-server:8080
  realm: gaia-x
  resource: federated-catalogue
  credentials:
    secret: ${KEYCLOAK_CREDENTIALS_SECRET:}

datastore:
  file-path: target

admin:
  dashboard:
    keycloak-auth-server-url: ${keycloak.auth-server-url}
    keycloak-realm: ${keycloak.realm}
    keycloak-admin-console-url: ${keycloak.admin-console-url:}
    file-store-path: ${datastore.file-path}

graphstore:
  impl: neo4j #fuseki, none
  auto-rebuild-on-empty: false
  uri: bolt://localhost:7687
  user: neo4j
  password: neo12345
  timeout-marker: The transaction has not completed within the timeout specified

publisher:
#  impl: none #nats
#  url: nats://localhost:4222 
  subject: fc.sd
#  instance: http://localhost:8081
  send-content: false
  impl: none
  instance: http://localhost:8081
  url: https://ces-v1.lab.gaia-x.eu
  comp-url: https://compliance.lab.gaia-x.eu/v1/api

subscriber:
#  impl: none
#  url: nats://localhost:4222
#  subject: fc.sd.*
#  instance: http://localhost:8082
#  stream: fc-sd 
#  queue: sd-processor
#  group: sd-group
  impl: none #ces
  instance: http://localhost:8081
  url: https://ces-v1.lab.gaia-x.eu 
  page-size: 20
  fixed-rate: 30s
  verify:
    semantics: true
    schema: true
    vp-signature: false
    vc-signature: false
    integrity: true

federated-catalogue:
  scope: runtime
  rdf:
    content-types:
      - application/ld+json
      - application/vc+ld+json
      - application/vp+ld+json
      - application/vc+jwt
      - application/vp+jwt
      # Uncomment as VerificationService gains support for these formats:
      # - text/turtle
      # - application/n-triples
      # - application/rdf+xml
      # - application/n-quads
      # - application/trig
  file-store:
    cached: true
    cache-size: 128
    schema:
      location: schemaFiles        # RDF schema definitions used for SD validation
    asset:
      location: assetFiles         # Non-RDF file content (PDFs, images, binaries)
    context-cache:
      location: contextCacheFiles  # Cached JSON-LD context documents
  query:
    partners:
    self: "http://localhost:${server.port}"
  verification:
    # Trust Framework Configuration
    # When trust-framework.gaiax.enabled is false (default), credentials can be uploaded
    # without Gaia-X compliance validation. The trust anchor registry will not be called.
    # When true, full Gaia-X Trust Framework validation is enforced.
    trust-framework:
      gaiax:
        enabled: false  # Set to true to enforce Gaia-X Trust Framework compliance
        # URLs for Gaia-X Trust Framework services (only used when enabled: true)
        trust-anchor-url: "https://registry.lab.gaia-x.eu/v1/api/trustAnchor/chain/file"
    http-timeout: 3000
    validator-expire: 1D
    # Base class type URIs for credential subject classification.
    # Loire (Gaia-X 2511) and legacy Tagus (gax-core) URIs are both configured
    # so that type resolution can select the appropriate set per credential format.
    participant:
      type: "https://w3id.org/gaia-x/2511#Participant"
      legacy-type: "https://w3id.org/gaia-x/core#Participant"
    resource:
      type: "https://w3id.org/gaia-x/2511#Resource"
      legacy-type: "https://w3id.org/gaia-x/core#Resource"
    service-offering:
      type: "https://w3id.org/gaia-x/2511#ServiceOffering"
      additional-types: "https://w3id.org/gaia-x/2511#DigitalServiceOffering"
      legacy-type: "https://w3id.org/gaia-x/core#ServiceOffering"
    semantics: true
    schema: false
    vp-signature: false
    vc-signature: false
    signature-verifier: uni-res #local
    did: 
      base-url: "https://dev.uniresolver.io/1.0" #/identifiers/
      cache:
        size: 100
        timeout: 1H
    doc-loader:
      additional-context:
        # Maps JSON-LD context URLs to fetch URLs. Format: '[<context-url>]: <fetch-url>'
        # The square brackets around the key are required YAML quoting for URLs containing '#' or special chars.
        # Each entry redirects a context URL the document loader would normally fetch remotely
        # to a different (e.g. local, cached, or versioned) URL instead.
        '[https://registry.lab.gaia-x.eu/development/api/trusted-shape-registry/v1/shapes/jsonld/trustframework#]': https://registry.lab.gaia-x.eu/development/api/trusted-shape-registry/v1/shapes/jsonld/trustframework#
        '[https://registry.lab.gaia-x.eu/v1/api/trusted-shape-registry/v1/shapes/jsonld/trustframework#]': https://registry.lab.gaia-x.eu/v1/api/trusted-shape-registry/v1/shapes/jsonld/trustframework#
        '[https://w3id.org/gaia-x/2511#]': https://registry.lab.gaia-x.eu/development/context/2511
      cache-size: 500
      cache-timeout: 24H
      enable-file: true
      enable-http: true
      enable-local-cache: false
    protected-namespace:
      namespace: "https://projects.eclipse.org/projects/technology.xfsc/federated-catalogue/meta#"
      prefix: "fcmeta"

logging:
  level:
    root: INFO
    eu.xfsc.fc: DEBUG
#    org.neo4j.driver: DEBUG
#    org.springframework: DEBUG
    org.springframework.web: DEBUG #INFO
#    org.springframework.security: DEBUG 

