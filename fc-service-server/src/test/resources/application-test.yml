federated-catalogue:
  scope: test
  verification:
    # Trust Framework Configuration - disabled by default for tests
    trust-framework:
      gaiax:
        enabled: false
        trust-anchor-url: "https://registry.lab.gaia-x.eu/v1/api/trustAnchor/chain/file"
    # Loire (2511) type URIs — used for GAIAX_V2_LOIRE credentials
    participant:
      type: "https://w3id.org/gaia-x/2511#Participant"
      # Legacy Tagus type URIs — used for GAIAX_V1_TAGUS test credentials
      legacy-type: "http://w3id.org/gaia-x/participant#Participant"
    resource:
      type: "https://w3id.org/gaia-x/2511#Resource"
      legacy-type: "https://w3id.org/gaia-x/gax-trust-framework#Resource"
    service-offering:
      type: "https://w3id.org/gaia-x/2511#ServiceOffering"
      additional-types: "https://w3id.org/gaia-x/2511#DigitalServiceOffering"
      legacy-type: "http://w3id.org/gaia-x/service#ServiceOffering"
  query:
    partners:
      - "http://localhost:9090"
      - "http://localhost:9091"

# Graph store disabled by default for tests. Tests needing a real graph store
# must add @TestPropertySource(properties = {"graphstore.impl=neo4j"}) and
# @Import(EmbeddedNeo4JConfig.class) to their test class.
graphstore:
  impl: none
  query-timeout-in-seconds: 5

scheduler:
  asset:
    cron:
      expression: 0 0 0 * * *
  schema:
    init-delay: 1000

spring:
  liquibase:
    contexts: test
