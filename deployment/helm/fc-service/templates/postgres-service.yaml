apiVersion: v1
kind: Service
metadata:
  name: {{ include "fc-service.postgres.fullname" . }}
  labels:
    {{- include "fc-service.postgres.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    {{- include "fc-service.postgres.selectorLabels" . | nindent 4 }}
