apiVersion: v1
kind: Service
metadata:
  name: {{ include "fc-service.fuseki.fullname" . }}
  labels:
    {{- include "fc-service.fuseki.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 3030
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "fc-service.fuseki.selectorLabels" . | nindent 4 }}
