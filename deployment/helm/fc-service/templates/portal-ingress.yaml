{{- if .Values.portal.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fc-service.portal.fullname" . }}
  labels:
    {{- include "fc-service.portal.labels" . | nindent 4 }}
  {{- with .Values.portal.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.portal.ingress.className }}
  {{- if .Values.portal.tls }}
  tls:
    - hosts:
        - {{ .Values.hosts.portal | quote }}
      secretName: {{ .Values.portal.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.hosts.portal | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "fc-service.portal.fullname" . }}
                port:
                  number: {{ .Values.portal.service.port }}
{{- end }}

