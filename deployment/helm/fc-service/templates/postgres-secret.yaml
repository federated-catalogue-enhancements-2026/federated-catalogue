apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fc-service.postgres.fullname" . }}
  labels:
    {{- include "fc-service.postgres.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.postgresql.auth.postgresPassword | quote }}
  password: {{ .Values.postgresql.auth.password | quote }}
