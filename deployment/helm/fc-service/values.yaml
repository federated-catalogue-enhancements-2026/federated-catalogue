# Default values for fc-service.
#
# To change the deployment hostnames, update the hosts section below.
# Downstream sections (ingress.hosts, keycloak.hostname, keycloak.ingress, etc.)
# must be kept in sync manually — values.yaml cannot self-reference.

# Hostname configuration (single source of truth for templates)
hosts:
  fcService: "fc-server.<EXTERNAL-IP>.sslip.io"
  keycloak: "key-server.<EXTERNAL-IP>.sslip.io"
  portal: "fc-demo-portal.<EXTERNAL-IP>.sslip.io"

name: fc-service
replicaCount: 1

image:
  repository: ghcr.io/eclipse-xfsc/federated-catalogue/fc-service-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

#imagePullSecrets: []
#nameOverride: ""
fullnameOverride: "fc-service"

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
#    nginx.ingress.kubernetes.io/server-snippet: |
#        location /actuator {
#          deny all;
#          return 403;
#        }
  hosts:
    - host: "fc-server.<EXTERNAL-IP>.sslip.io"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fc-server-tls
      hosts:
        - "fc-server.<EXTERNAL-IP>.sslip.io"

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

probes:
  path: /actuator/health
  initialDelaySeconds: 60
  periodSeconds: 30

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumeMounts:
  - name: logs
    mountPath: /logs
  - name: tmp
    mountPath: /tmp

volumes:
  - name: logs
    emptyDir: {}
  - name: tmp
    emptyDir: {}

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - fc-service
          topologyKey: "kubernetes.io/hostname"

hostAliases: []

storage:
  enabled: false
  size: 2Gi
  path: /mnt/data/postgresql

env:
  - name: DATASTORE_FILE_PATH
    value: /var/lib/fc-service/filestore
  - name: FEDERATED_CATALOGUE_VERIFICATION_SIGNATURES
    value: "true"
  - name: GRAPHSTORE_IMPL
    value: fuseki
  - name: GRAPHSTORE_URI
    value: http://fc-fuseki:3030/ds
  - name: GRAPHSTORE_USER
    value: admin
  - name: GRAPHSTORE_PASSWORD
    value: admin
  - name: KEYCLOAK_AUTH_SERVER_URL
    value: http://fc-keycloak-headless.federated-catalogue.svc.cluster.local:8080/auth
  - name: KEYCLOAK_CREDENTIALS_SECRET
    valueFrom:
      secretKeyRef:
        name: fc-keycloak-client-secret
        key: keycloak_client_secret
  - name: SPRING_DATASOURCE_URL
    value: jdbc:postgresql://fc-postgres:5432/postgres
  - name: SPRING_DATASOURCE_USERNAME
    value: keycloak
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: fc-postgres
        key: password
#  - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY
#    value: DEBUG

postgresql:
  fullnameOverride: fc-postgres
  # Using official PostgreSQL image (not Bitnami)
  image:
    repository: postgres
    tag: "15.2"
  auth:
    postgresPassword: postgres
    username: keycloak
    password: keycloak
    database: postgres
  persistence:
    enabled: true
    size: 10Gi

keycloak:
  fullnameOverride: fc-keycloak
  replicas: 1

  # Use official Keycloak image from quay.io
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.5.5"

  # Command and arguments for realm import
  command:
    - "/opt/keycloak/bin/kc.sh"
  args:
    - "start"
    - "--import-realm"

  # HTTP configuration
  http:
    enabled: true

  # Hostname configuration — keep in sync with hosts.keycloak above
  hostname:
    hostname: "key-server.<EXTERNAL-IP>.sslip.io"
    strict: false
    strictBackchannel: false

  # Proxy configuration - disabled; KC_PROXY_HEADERS set directly in extraEnv (Keycloak 26+)
  proxy:
    enabled: false

  # Database configuration
  database:
    vendor: postgres
    hostname: fc-postgres
    port: 5432
    database: keycloak
    username: keycloak
    existingSecret: fc-postgres
    existingSecretPasswordKey: password

  # extraEnv is processed via tpl by keycloakx, so template syntax is valid here.
  extraEnv: |-
    - name: KEYCLOAK_ADMIN
      value: admin
    - name: KEYCLOAK_ADMIN_PASSWORD
      value: admin
    - name: KC_PROXY_HEADERS
      value: xforwarded
    - name: KC_HOSTNAME
      value: "{{ .Values.hostname.hostname }}"
    - name: KC_HOSTNAME_STRICT
      value: "false"

  # Realm import via volume mount
  extraVolumeMounts: |-
    - name: realm-config
      mountPath: "/opt/keycloak/data/import"
      readOnly: true

  extraVolumes: |-
    - name: realm-config
      configMap:
        name: fc-keycloak-realm-configmap

  # Ingress configuration — keep in sync with hosts.keycloak above
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    rules:
      - host: "key-server.<EXTERNAL-IP>.sslip.io"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - "key-server.<EXTERNAL-IP>.sslip.io"
        secretName: keycloak-tls

  # Service
  service:
    type: ClusterIP
    httpPort: 8080

portal:
  fullnameOverride: fc-demo-portal
  replicaCount: 1
  image:
    repository: ghcr.io/eclipse-xfsc/federated-catalogue/fc-demo-portal
    tag: ""
    pullPolicy: IfNotPresent
  # keycloakIssuerUri is constructed from hosts.keycloak in portal-deployment.yaml
  fcBaseUri: http://fc-service:8081
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  service:
    port: 8088
  tls:
    secretName: fc-demo-portal-tls
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/affinity: cookie
      nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
      nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
  probes:
    path: /actuator/health
    initialDelaySeconds: 60
    periodSeconds: 30
  resources: {}
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  volumeMounts:
    - name: logs
      mountPath: /logs
    - name: tmp
      mountPath: /tmp
  volumes:
    - name: logs
      emptyDir: {}
    - name: tmp
      emptyDir: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

fuseki:
  fullnameOverride: fc-fuseki
  image:
    repository: docker.io/stain/jena-fuseki
    tag: "latest"
  dataset: ds
  adminPassword: admin
  jvmArgs: "-Xmx1g"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
