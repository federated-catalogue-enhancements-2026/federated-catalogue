# Default values for fc-service.
#
# To change the deployment IP, update the three anchor definitions below.
# All hostnames throughout this file reference these anchors.

# --- Hostname anchors (single source of truth for the ingress IP) ---
ingressIP: 82.165.249.107
fcServiceHost: &fcServiceHost "fc-server.82.165.249.107.sslip.io"
keycloakHost: &keycloakHost "key-server.82.165.249.107.sslip.io"
portalHost: &portalHost "fc-demo-portal.82.165.249.107.sslip.io"
# -------------------------------------------------------------------

name: fc-service
replicaCount: 1

image:
  repository: ghcr.io/federated-catalogue-enhancements-2026/federated-catalogue/fc-service-server
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "feature-kubernetes"

#imagePullSecrets: []
#nameOverride: ""
fullnameOverride: "fc-service"

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
#    nginx.ingress.kubernetes.io/server-snippet: |
#        location /actuator {
#          deny all;
#          return 403;
#        }
  hosts:
    - host: *fcServiceHost
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fc-server-tls
      hosts:
        - *fcServiceHost

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

probes:
  path: /actuator/health
  initialDelaySeconds: 60
  periodSeconds: 30

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumeMounts:
  - name: logs
    mountPath: /logs
  - name: tmp
    mountPath: /tmp

volumes:
  - name: logs
    emptyDir: {}
  - name: tmp
    emptyDir: {}

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - fc-service
          topologyKey: "kubernetes.io/hostname"

# hostAliases are not needed when using sslip.io for DNS resolution
# The cluster DNS will automatically resolve *.sslip.io hostnames
hostAliases: []

storage:
  enabled: false
  size: 2Gi
  path: /mnt/data/postgresql

env:
  - name: DATASTORE_FILE_PATH
    value: /var/lib/fc-service/filestore
  - name: FEDERATED_CATALOGUE_VERIFICATION_SIGNATURES
    value: "true"
  - name: GRAPHSTORE_IMPL
    value: neo4j
  - name: GRAPHSTORE_URI
    value: bolt://fc-neo4j:7687
  - name: GRAPHSTORE_QUERY_TIMEOUT_IN_SECONDS
    value: "5"
  - name: GRAPHSTORE_PASSWORD
    value: neo12345
#    valueFrom:
#      secretKeyRef:
#        name: fc-neo4j-secret
#        key: password
  - name: KEYCLOAK_AUTH_SERVER_URL
    value: http://fc-keycloak-headless.federated-catalogue.svc.cluster.local:8080/auth
  - name: KEYCLOAK_CREDENTIALS_SECRET
    valueFrom:
      secretKeyRef:
        name: fc-keycloak-client-secret
        key: keycloak_client_secret
  - name: SPRING_DATASOURCE_URL
    value: jdbc:postgresql://fc-postgres:5432/postgres
  - name: SPRING_DATASOURCE_USERNAME
    value: keycloak
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: fc-postgres
        key: password
#  - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY
#    value: DEBUG

postgresql:
  # Using official PostgreSQL image (not Bitnami)
  image:
    repository: postgres
    tag: "15.2"
  auth:
    postgresPassword: postgres
    username: keycloak
    password: keycloak
    database: postgres
  persistence:
    enabled: true
    size: 10Gi

keycloak:
  fullnameOverride: fc-keycloak
  replicas: 1

  # Use official Keycloak image from quay.io
  image:
    repository: quay.io/keycloak/keycloak
    tag: ""  # Use chart default (26.5.5)

  # Command and arguments for realm import
  command:
    - "/opt/keycloak/bin/kc.sh"
  args:
    - "start"
    - "--import-realm"

  # HTTP configuration
  http:
    enabled: true

  # Hostname configuration
  hostname:
    hostname: *keycloakHost
    strict: false
    strictBackchannel: false

  # Proxy configuration - disabled; KC_PROXY_HEADERS set directly in extraEnv (Keycloak 26+)
  proxy:
    enabled: false

  # Database configuration
  database:
    vendor: postgres
    hostname: fc-postgres
    port: 5432
    database: keycloak
    username: keycloak
    existingSecret: fc-postgres
    existingSecretPasswordKey: password

  # extraEnv is processed via tpl by keycloakx, so template syntax is valid here.
  extraEnv: |-
    - name: KEYCLOAK_ADMIN
      value: admin
    - name: KEYCLOAK_ADMIN_PASSWORD
      value: admin
    - name: KC_PROXY_HEADERS
      value: xforwarded
    - name: KC_HOSTNAME
      value: "{{ .Values.keycloakHost }}"
    - name: KC_HOSTNAME_STRICT
      value: "false"

  # Realm import via volume mount
  extraVolumeMounts: |-
    - name: realm-config
      mountPath: "/opt/keycloak/data/import"
      readOnly: true

  extraVolumes: |-
    - name: realm-config
      configMap:
        name: fc-keycloak-realm-configmap

  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    rules:
      - host: *keycloakHost
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - *keycloakHost
        secretName: keycloak-tls

  # Service
  service:
    type: ClusterIP
    httpPort: 8080

portal:
  replicaCount: 1
  image:
    repository: ghcr.io/federated-catalogue-enhancements-2026/federated-catalogue/fc-demo-portal
    tag: "feature-kubernetes"
    pullPolicy: Always
  host: *portalHost
  # keycloakIssuerUri is constructed from keycloakHost in portal-deployment.yaml
  fcBaseUri: http://fc-service:8081
  tls:
    secretName: fc-demo-portal-tls
  probes:
    path: /actuator/health
    initialDelaySeconds: 60
    periodSeconds: 30
  resources: {}

neo4j:
  fullnameOverride: fc-neo4j
  neo4j:
    name: fc-neo4j-db
    password: "neo12345"
  volumes:
    data:
      mode: defaultStorageClass
  env:
    NEO4J_PLUGINS: '["apoc", "graph-data-science", "n10s"]'
  additionalVolumes:
    - name: fc-neo4j-data
      emptyDir: {}
  additionalVolumeMounts:
    - name: fc-neo4j-data
      mountPath: "/var/lib/neo4j/plugins"
  config:
    dbms.security.procedures.unrestricted: gds.*,apoc.*,n10s.*,semantics.*
    dbms.security.procedures.allowlist: gds.*,apoc.*,n10s.*,semantics.*
  initContainers:
    - name: init-plugins
      image: appropriate/curl:latest
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: fc-neo4j-data
          mountPath: /var/lib/neo4j/plugins
      securityContext:
        allowPrivilegeEscalation: false
      command:
        - "/bin/sh"
        - "-c"
        - |
          curl -L https://github.com/neo4j-contrib/neo4j-apoc-procedures/releases/download/5.18.0/apoc-5.18.0-extended.jar -O
          curl -L https://github.com/neo4j-labs/neosemantics/releases/download/5.18.0/neosemantics-5.18.0.jar -O
          curl -L https://graphdatascience.ninja/neo4j-graph-data-science-2.6.6.jar -O
          cp -R apoc-5.18.0-extended.jar /var/lib/neo4j/plugins
          cp -R neosemantics-5.18.0.jar /var/lib/neo4j/plugins
          cp -R neo4j-graph-data-science-2.6.6.jar /var/lib/neo4j/plugins
