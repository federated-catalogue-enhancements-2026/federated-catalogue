openapi: 3.0.1
info:
  title: Eclipse XFSC Federated Catalogue
  description: REST API of the XFSC catalogue
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - url: https://fc-server.xfsc.org
    description: some future test environment
components:
  responses:
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: >-
        Forbidden. The user does not have the permission to execute this
        request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: >-
        May contain hints how to solve the error or indicate what went wrong at
        the server. Must not outline any information about the internal
        structure of the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ClientError:
      description: >-
        May contain hints how to solve the error or indicate what was wrong in
        the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: HTTP Conflict 409
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unprocessible:
      description: HTTP Unprocessible Entity 422
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnsupportedMediaType:
      description: >-
        The Content-Type indicates a query language not supported by the active
        graph database backend. Check GET /query/info for the supported language.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
    Statement:
      type: object
      properties:
        statement:
          type: string
          example: Match (m:Movie) where m.released > 2000 RETURN m
        parameters:
          $ref: '#/components/schemas/Parameters'
      required:
        - statement
    Parameters:
      type: object
      additionalProperties:
        type: object
      example:
        name: "John"
        limit: 10
        offset: 5
    Result:
      type: object
      additionalProperties:
        type: object
    QueryLanguage:
      type: string
      enum:
        - OPENCYPHER
        - SPARQL
      default: OPENCYPHER
    AnnotatedStatement:
      allOf:
        - $ref: '#/components/schemas/Statement'
        - type: object
          properties:
            servers:
              type: array
              uniqueItems: true
              items:
                type: string
                description: known catalog servers already queried in distributed search scenario
            annotations:
              type: object
              additionalProperties:
                type: object
                description: additional properties to tune query execution
              example:
                queryLanguage: SPARQL
                timeout: 30
                withTotalCount: false
    VerificationResult:
      type: object
      properties:
        verificationTimestamp:
          type: string
          format : date-time
        lifecycleStatus: #!! is not known when verifying external credentials -> Julius: You are supposed to compute the status (active, invalid, etc.) from the available information. That is the result of the validation. Maybe rename to just status
          type: string # does the asset have a lifecycle status in this catalogue?
          description: Lifecycle-state an asset would get, if it would be added to the catalogue.
        issuer: #!! Is this the participant? -> Julius: Yes, the participant that created the credential
          type: string # contains the id of the issuers credential if available #!! NOT FURTHER SPECIFIED
          description: ID of the issuer's credential, if available.
        issuedDateTime:
          type: string
          format: date-time
        validatorDids:
          type: array
          items:
            type: string
            description: The DIDs of validators that signed parts of the credential
        warnings:
          type: array
          description: >-
            Warnings issued during processing (e.g. triples removed due to reserved namespace filtering).
            The operation succeeded for all remaining data. Absent or empty when no warnings occurred.
          items:
            type: string
          example:
            - "2 triple(s) were removed from your upload because they use the reserved internal namespace
               <https://projects.eclipse.org/projects/technology.xfsc/federated-catalogue/meta#>.
               This namespace is reserved for internal catalogue use only and cannot be set by external clients."
      required:
        - verificationTimestamp
        - lifecycleStatus #!! is not known when verifying external credentials. Remove from required -> Julius: You are supposed to compute the status (active, invalid, etc.) from the available information. That is the result of the validation. Maybe rename to just status
        - issuer #!! Comment on issuer: if available, but still required?? Remove from required -> Julius: required
        - issuedDateTime
        - validatorDids
        - warnings
    Participant:
      type: object
      properties:
        id:
          type: string
          description: Global ID of the participant
        name:
          type: string
        publicKey: #!! Can this be changed? If it is changed, are all credentials signed by the old key invalid? -> Julius: For the first version you can assume that credentials go invalid when the TrustAnchor or participant key change
          type: string
        asset:
          type: string
    User:
      type: object
      properties:
        participantId:
          type: string
          description: Global ID of the associated participant
          example: ExampleCompany
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
        roleIds:
          type: array
          items:
            $ref: '#/components/schemas/Role'
      required:
        - participantId
        - firstName
        - lastName
        - email
    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            id:
              type: string
              description: Internal catalogue user id
              example: ExampleCompany-John-Doe
            username:
              type: string
              example: John Doe
          required:
            - id
            - username
    Role: #!! Changed Role from an object with a single String property to simply a String
      type: string
      example: Ro-MU-CA
    Session:
      type: object
      properties:
        userId:
          type: string
        creationDatetime:
          type: string
          format: date-time
        status: #!! What is a status?
          type: string
#        seed: #!! We must have a seed to do pagination, user must be able to set it? -> Julius: ok
#          type: string
        roleIds:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    Asset:
      type: object
      properties:
        assetHash:
          type: string
        id: #!! Added id / credentialSubject
          type: string
        status:
          $ref: '#/components/schemas/AssetStatus'
        issuer:
          type: string
        validatorDids:
          description: >-
            The credentialSubjects of the parties that validated (parts of) the
            credential.
          type: array
          items:
            type: string
        uploadDatetime:
          type: string
          format: date-time
          example: '2022-03-01T13:00:00Z'
          description: The time stamp (ISO8601) when the asset was uploaded.
        statusDatetime:
          type: string
          format: date-time
          example: '2022-05-11T15:30:00Z'
          description: >-
            The last time stamp (ISO8601) the status changed (for this
            Catalogue)
        contentType:
          type: string
          description: MIME content-type of the uploaded asset (e.g. application/ld+json, application/pdf)
          example: 'application/ld+json'
        fileSize:
          type: integer
          format: int64
          description: Size of the uploaded asset in bytes
        warnings:
          type: array
          description: >-
            Warnings issued during processing (e.g. triples removed due to reserved namespace filtering).
            The operation succeeded for all remaining data. Absent or empty when no warnings occurred.
          items:
            type: string
          example:
            - "2 triple(s) were removed from your upload because they use the reserved internal namespace
               <https://projects.eclipse.org/projects/technology.xfsc/federated-catalogue/meta#>.
               This namespace is reserved for internal catalogue use only and cannot be set by external clients."
        humanReadableId:
          type: string
          description: >-
            IRI of the linked human-readable representation (e.g. a PDF document),
            if one has been attached to this machine-readable asset. Absent when no link exists.
        machineReadableId:
          type: string
          description: >-
            IRI of the linked machine-readable asset, if this asset is a human-readable
            representation linked to a machine-readable parent. Absent when no link exists.
    AssetStatus:
      type: string
      enum:
        - active
        - eol
        - deprecated
        - revoked
    AssetResult:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Asset'
        content:
          type: string
    OntologySchema:
      type: object
      properties:
        ontologies:
          description: 'SchemaIds of ontologies, defining the terms of a schema'
          type: array
          items:
            type: string
            example: schemaId
        shapes:
          description: 'SchemaIds of shapes (SHACL Shapes Constraint Language) used to validate instances against the schema.'
          type: array
          items:
            type: string
            example: schemaId
        vocabularies:
          description: 'SchemaIds of controlled vocabularies used in the schema'
          type: array
          items:
            type: string
            example: schemaId
        jsonSchemas:
          description: 'SchemaIds of JSON Schemas used to validate JSON assets.'
          type: array
          items:
            type: string
            example: schemaId
        xmlSchemas:
          description: 'SchemaIds of XML Schemas (XSD) used to validate XML assets.'
          type: array
          items:
            type: string
            example: schemaId
    ResultPage:
      type: object
      properties:
        totalCount:
          type: integer
    Assets:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AssetResult'
    Participants:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items: 
              type: array
              items: 
                $ref: '#/components/schemas/Participant'
    UserProfiles:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items: 
              type: array
              items: 
                $ref: '#/components/schemas/UserProfile'
    Results:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Result'
    SchemaResult:
      type: object
      properties:
        id:
          type: string
          description: 'The internal identifier of the schema.'
        warnings:
          type: array
          items:
            type: string
          description: 'Warnings generated during schema import (e.g. filtered protected namespace statements).'
        createdAt:
          type: string
          format: date-time
          nullable: true
          description: 'Timestamp when the schema was first uploaded. Present on creation, null on updates.'
        version:
          type: integer
          nullable: true
          description: 'Current version number after this operation. Present on updates, null on creation.'
        previousVersion:
          type: integer
          nullable: true
          description: 'Version number before this operation. Null for first version or on creation.'
    AssetVersion:
      type: object
      required: [version, createdAt, createdBy, status, isCurrent]
      properties:
        version:
          type: integer
          description: '1-based version ordinal.'
        createdAt:
          type: string
          format: date-time
          description: 'Timestamp when this version was created (Envers revision timestamp).'
        createdBy:
          type: string
          description: 'Issuer DID of the asset at this version.'
        status:
          $ref: '#/components/schemas/AssetStatus'
        isCurrent:
          type: boolean
          description: 'Whether this is the current (latest) version.'
        changeComment:
          type: string
          nullable: true
          description: 'Optional change note provided at upload time.'
    AssetVersionList:
      type: object
      required: [id, total, versions]
      properties:
        id:
          type: string
          description: 'The asset IRI.'
        total:
          type: integer
          description: 'Total number of versions.'
        versions:
          type: array
          items:
            $ref: '#/components/schemas/AssetVersion'
          description: 'Descending list (newest first) for the requested page.'
    SchemaVersion:
      type: object
      properties:
        version:
          type: integer
          description: '1-based version ordinal.'
        createdAt:
          type: string
          format: date-time
          description: 'Timestamp when this version was created.'
        isCurrent:
          type: boolean
          description: 'Whether this is the current (latest) version.'
    SchemaVersionList:
      type: object
      properties:
        schemaId:
          type: string
          description: 'The schema identifier.'
        versions:
          type: array
          items:
            $ref: '#/components/schemas/SchemaVersion'
    QueryInfo:
      type: object
      properties:
        backend:
          type: string
          example: "NEO4J"
        queryLanguage:
          type: string
          example: "OPENCYPHER"
        contentType:
          type: string
          example: "application/opencypher-query"
        enabled:
          type: boolean
          example: true
        exampleQuery:
          type: string
        documentation:
          type: string
    RebuildStatus:
      type: object
      properties:
        total:
          type: integer
          format: int64
          description: Total number of assets to process
        processed:
          type: integer
          format: int64
          description: Number of assets processed so far
        percentComplete:
          type: integer
          description: Completion percentage (0-100)
        running:
          type: boolean
          description: Whether a rebuild is currently running
        complete:
          type: boolean
          description: Whether the rebuild has completed
        failed:
          type: boolean
          description: Whether the rebuild has failed
        errorMessage:
          type: string
          description: Error message if the rebuild failed
        errors:
          type: integer
          format: int64
          description: Number of assets that failed during processing
        durationMs:
          type: integer
          format: int64
          description: Duration in milliseconds since rebuild started
    GraphStatus:
      type: object
      properties:
        backend:
          type: string
          description: The graph database backend type (NEO4J, FUSEKI, NONE)
        enabled:
          type: boolean
          description: Whether the graph store is enabled
        healthy:
          type: boolean
          description: Whether the graph store backend is healthy
        activeAssetCount:
          type: integer
          format: int64
          description: Number of active assets in PostgreSQL storage
        claimCountInGraph:
          type: integer
          format: int64
          description: Number of claim triples/nodes in the graph database
        assetCountInGraph:
          type: integer
          format: int64
          description: Number of distinct assets in the graph database
        syncAssessment:
          type: string
          description: Sync assessment (empty, in-sync, out-of-sync, unknown, disabled)
    AdminStats:
      type: object
      properties:
        totalAssets:
          type: integer
          format: int64
          description: Total number of assets in the catalogue
        activeAssets:
          type: integer
          format: int64
          description: Number of active assets
        activeTrustFrameworks:
          type: integer
          format: int64
          description: Number of active trust frameworks
        totalUsers:
          type: integer
          format: int64
          description: Total number of registered users
        totalSchemas:
          type: integer
          format: int64
          description: Total number of schemas
        totalParticipants:
          type: integer
          format: int64
          description: Total number of participants
        graphClaimCount:
          type: integer
          format: int64
          description: Number of claims in the graph database
        graphBackend:
          type: string
          description: The graph database backend type
    AdminHealthStatus:
      type: object
      properties:
        catalogueStatus:
          type: string
          description: Catalogue service status (UP/DOWN)
        graphDbStatus:
          type: object
          properties:
            connected:
              type: boolean
            backend:
              type: string
            claimCount:
              type: integer
              format: int64
        keycloakStatus:
          type: string
          description: Keycloak status (UP/DOWN/UNKNOWN)
        fileStoreStatus:
          type: string
          description: File store status (UP/DOWN)
        databaseStatus:
          type: string
          description: Database status (UP/DOWN)
        keycloakUrl:
          type: string
          description: Keycloak issuer URL
        fileStorePath:
          type: string
          description: File store directory path
    KeycloakAdminUrl:
      type: object
      properties:
        url:
          type: string
          description: Keycloak Admin Console URL for the catalogue realm
    TrustFrameworkEntry:
      type: object
      properties:
        id:
          type: string
          description: Trust framework identifier
        name:
          type: string
          description: Display name
        serviceUrl:
          type: string
          description: Trust framework service URL
        apiVersion:
          type: string
          description: API version
        timeoutSeconds:
          type: integer
          description: Connection timeout in seconds
        connected:
          type: boolean
          description: Whether the service is currently reachable
        enabled:
          type: boolean
          description: Whether this framework is active
    TrustFrameworkConfigUpdate:
      type: object
      properties:
        serviceUrl:
          type: string
          description: New service URL
        apiVersion:
          type: string
          description: New API version
        timeoutSeconds:
          type: integer
          description: New timeout in seconds
    SchemaValidationStatus:
      type: object
      properties:
        totalSchemaCount:
          type: integer
          format: int64
          description: Total number of schemas across all modules
        modules:
          type: array
          items:
            $ref: '#/components/schemas/SchemaValidationModule'
    SchemaValidationModule:
      type: object
      properties:
        type:
          type: string
          description: Module type (SHACL, JSON_SCHEMA, XML_SCHEMA, OWL)
        name:
          type: string
          description: Display name
        description:
          type: string
          description: Module description
        schemaCount:
          type: integer
          format: int64
          description: Number of schemas for this module
        enabled:
          type: boolean
          description: Whether this module is active
    GraphDatabaseStatus:
      type: object
      properties:
        activeBackend:
          type: string
          description: Currently active graph database backend
        connected:
          type: boolean
          description: Whether the graph database is reachable
        claimCount:
          type: integer
          format: int64
          description: Number of claims in the graph database
        version:
          type: string
          description: Graph database version or implementation info
    GraphDatabaseSwitchResult:
      type: object
      properties:
        restartRequired:
          type: boolean
          description: Whether a restart is needed for the switch to take effect
        message:
          type: string
          description: Human-readable status message

    ProvenanceCredential:
      type: object
      required: [id, assetId, assetVersion, issuer, issuedAt, provenanceType, credentialFormat]
      properties:
        id:
          type: string
          format: uuid
          description: Internal UUID of the persisted provenance credential.
        assetId:
          type: string
          description: IRI of the asset this credential is attached to.
        assetVersion:
          type: integer
          description: 1-based Envers version ordinal the credential is linked to.
        credentialId:
          type: string
          description: VC id field (unique per asset).
        issuer:
          type: string
          description: DID of the VC issuer.
        issuedAt:
          type: string
          format: date-time
          description: issuedDateTime extracted from the VC.
        provenanceType:
          type: string
          enum: [CREATION, DERIVATION, ATTRIBUTION, MODIFICATION, APPROVAL]
          description: Provenance relation type, mapped to a PROV-O predicate.
        credentialFormat:
          type: string
          enum: [JSONLD, JSONLD_JWT, JWT]
          description: Detected credential format.
        credentialContent:
          type: string
          description: Raw VC payload (JSON-LD or JWT string).
        verified:
          type: boolean
          description: Whether this credential has been verified.
        verificationTimestamp:
          type: string
          format: date-time
          nullable: true
          description: When the last verification was performed.
        verificationResult:
          $ref: '#/components/schemas/ProvenanceVerificationResult'
    ProvenanceCredentials:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ProvenanceCredential'
    ProvenanceVerificationResult:
      type: object
      properties:
        isValid:
          type: boolean
          description: Overall validity of the credential.
        verificationTimestamp:
          type: string
          format: date-time
        verificationMethod:
          type: string
          description: DID verification method used.
        issuerResolutionStatus:
          type: string
          enum: [RESOLVED, UNRESOLVABLE, TEMPORARILY_UNAVAILABLE]
          description: Result of DID resolution for the issuer.
        issuedDateTime:
          type: string
          format: date-time
        signatureValid:
          type: boolean
        credentialExpiryValid:
          type: boolean
        validatorDids:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string

  parameters:
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      required: false
      description: The number of items to skip before starting to collect the result set.
    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
      required: false
      description: The number of items to return.
    OrderByParam:
      in: query
      name: orderBy
      schema:
        type: string
      required: false
      description: Results will be sorted by this field.
    AscendingParam:
      in: query
      name: ascending
      schema:
        type: boolean
        default: true
      required: false
      description: Ascending/Descending ordering.
    StatusParam:
      in: query
      name: statuses
      schema:
        type: array
        items:
          $ref: '#/components/schemas/AssetStatus'
      explode: false
      required: false
      description: Asset statuses
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
  - name: Assets
    description: >-
      Manage assets in the Catalogue. Assets can be RDF credentials (JSON-LD
      Verifiable Presentations containing Verifiable Credentials), non-credential 
      RDF data (plain RDF triples), or non-RDF files. RDF content is automatically 
      verified and all claims or triples extracted to the graph database. Non-RDF 
      content is stored as-is. Assets are referenced by their sha256 hash. Catalogues 
      synchronize by exchanging changesets (lists of hashes) with peer Catalogues 
      and downloading any assets not yet locally available.
    externalDocs:
      description: Find out more
      url: https://docs.gaia-x.eu
  - name: Query
    description: Send graph queries to this Catalogue.
  - name: Schemas
    description: >-
      Schemas define the format of assets in the catalogue. Supported types include
      RDF schemas (ontologies, shapes, vocabularies) as well as non-RDF schemas
      (JSON Schema, XML Schema).
  - name: Verification
    description: The Catalogue provides a verification service for e.g. checking the syntax
  - name: Participants
    description: Participant Management operations
  - name: Users
    description: User Management operations
  - name: Roles
    description: Role Managemet operations
  - name: Session
    description: Management for auth sessions in the catalogue
  - name: Graph Admin
    description: Graph database administration operations.
  - name: Admin
    description: Administration dashboard and system management operations.
  - name: TrustFrameworkAdmin
    description: Trust framework configuration and management.
  - name: SchemaValidationAdmin
    description: Schema validation module configuration.
  - name: GraphDatabaseAdmin
    description: Graph database status and backend switching.
paths:
  /admin/me:
    get:
      tags:
        - Admin
      summary: Check if the current user has admin access
      operationId: checkAdminAccess
      security:
        - jwt: []
      responses:
        '200':
          description: User has admin access
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/stats:
    get:
      tags:
        - Admin
      summary: Get dashboard statistics
      operationId: getAdminStats
      security:
        - jwt: []
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /admin/health:
    get:
      tags:
        - Admin
      summary: Get component health overview
      operationId: getAdminHealth
      security:
        - jwt: []
      responses:
        '200':
          description: Component health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminHealthStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /admin/keycloak-url:
    get:
      tags:
        - Admin
      summary: Get the Keycloak Admin Console URL for embedding
      operationId: getKeycloakAdminUrl
      security:
        - jwt: []
      responses:
        '200':
          description: Keycloak Admin Console URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeycloakAdminUrl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /admin/trust-frameworks:
    get:
      tags:
