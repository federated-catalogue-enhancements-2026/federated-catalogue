  /schemas/latest:
    get: 
      tags:
        - Schemas
      summary: 'Get the latest schema for a given type.'
      description: >-
        Behavior depends on schema type:

        **RDF types** (ontology, shape, vocabulary): Returns the **composite schema** — a merged union
        of all stored schemas of that type. This is meaningful because RDF schemas are additive
        (shapes and ontologies can be combined into a single graph).

        **Non-RDF types** (json, xml): Returns the **most recently uploaded** schema of that type.
        Compositing does not apply because JSON and XML schemas are self-contained and cannot be
        meaningfully merged.
      operationId: getLatestSchema
      parameters:
        - name: type
          in: query
          description: 'Type of the schema.'
          required: true
          schema:
            type: string
            enum:
              - ontology
              - shape
              - vocabulary
              - json
              - xml
        - name: term
          in: query
          description: 'The URI of the term of the requested schema e.g. `https://w3id.org/gaia-x/2511#ServiceOffering`'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 'The latest schemas for the given type or term.'
          content:
            application/rdf+xml:
              schema:
                type: string
                description: 'OWL file describing the ontology of the schema or SKOS file describing the controlled vocabulary.'
            text/turtle:
              schema:
                type: string
                description: 'SHACL file describing the ontology of the schema.'
            application/schema+json:
              schema:
                type: string
                description: 'JSON Schema file.'
            application/xml:
              schema:
                type: string
                description: 'XML Schema (XSD) file.'
        '400':
          $ref: '#/components/responses/ClientError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
